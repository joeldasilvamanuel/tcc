<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: monospace, sans-serif;
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="expanded">
            <!-- TOPO -->
            <div class="sidebar-top">
                <div class="logo-box">
                    <img src="/public/img/logo02.png" alt="Health Access Hub">
                </div>

                <!-- BOTÃO DE TOGGLE -->
                <button id="toggleSidebar" class="toggle-btn" aria-label="Recolher menu">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
            </div>

            <!-- MENU -->
            <nav class="navbar">
                <ul class="nav-list">
                    <li>
                        <a href="/dashboard/admin" class="nav-link active">
                            <i class="fa-solid fa-house"></i><span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/admin/visao-geral" class="nav-link">
                            <i class="fa-solid fa-house"></i><span>Visão Geral</span>
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/admin/profissionais" class="nav-link">
                            <i class="fa-solid fa-users"></i><span>Gestão de Profissionais</span>
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/admin/utentes" class="nav-link">
                            <i class="fa-solid fa-message"></i><span>Gestão de Utentes</span>
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/admin/relatorios" class="nav-link">
                            <i class="fa-solid fa-calendar-check"></i><span>Relatórios</span>
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/admin/configuracoes" class="nav-link">
                            <i class="fa-solid fa-bell"></i><span>Configurações</span>
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/admin/perfil" class="nav-link">
                            <i class="fa-solid fa-user"></i><span>Perfil</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- LOGOUT -->
            <div class="logout-area">
                <a href="/auth/logout" class="nav-link logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Sair</span> </a>
            </div>
        </aside>
    </div>
</body>

</html>
