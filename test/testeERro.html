<!DOCTYPE html>
<html lang="en" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/public/img/logo02.png">
    <link rel="stylesheet" href="/error.css">
    <title>Health Access Hub | Error!</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #212529;
            --text-muted: #6c757d;
            --red: #dc3545;
            --btn-bg: #212529;
            --btn-text: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --card-bg: #1e1e1e;
                --text: #e9ecef;
                --text-muted: #adb5bd;
                --red: #ff4d5e;
                --btn-bg: #e9ecef;
                --btn-text: #121212;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-container {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .error-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            margin: 0 auto 24px;
        }

        .error-code {
            font-size: 14px;
            font-weight: 600;
            color: var(--red);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .error-msg {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: block;
            padding: 14px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: var(--btn-bg);
            color: var(--btn-text);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--text-muted);
        }
    </style>
</head>

<body>

    <div class="error-container">
        <!-- Troca o src pela imagem que gerei -->
        <img src="/public/img/401.jpg" alt="Erro de login" class="error-img">

        <div class="error-code">ERRO 401</div>
        <h1>Não foi possível entrar</h1>

        <p class="error-msg">
            O email ou a senha que você digitou estão incorretos.
            Por segurança, não informamos qual dos dois falhou.
            Verifique seus dados e tente novamente.
        </p>

        <div class="actions">
            <a href="/login" class="btn btn-primary">Tentar novamente</a>
            <a href="/recuperar" class="btn btn-secondary">Esqueci minha senha</a>
        </div>
    </div>

    <script>
        // Se quiser mudar a mensagem baseado na URL: /error.html?erro=login
        const params = new URLSearchParams(window.location.search);
        const erro = params.get('erro');

        if (erro === 'login') {
            document.querySelector('h1').textContent = 'Falha na autenticação';
        }

        // Redireciona para o login apos 5 segundos
        setTimeout(() => {
            windows.location.href = '/login';
        }, 5000);

        // Mostra contador
        let segundos = 5;
        const h1 = document.querySelector('h1');
        const textOriginal = h1.textContent;

        const interval = setInterval(() => {
            h1.textContent = `${textOriginal} - Voltando em ${segundos}`;
            segundos--;
            if (segundos < 0) clearInterval(interval);
        }, 1000);
    </script>
</body>

</html>
