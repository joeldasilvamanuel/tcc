<!DOCTYPE html>
<html lang="en" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logo02.png">
    <link rel="stylesheet" href="/css/prof/profDash.css">
    <title>Health Access Hub | Monitorar Saúse</title>
</head>

<body>
    <div class="app">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="expanded">
            <!-- TOPO -->
            <div class="sidebar-top">
                <div class="logo-box">
                    <img src="/img/logo02.png" alt="Health Access Hub">
                </div>

                <!-- BOTÃO DE TOGGLE -->
                <button id="toggleSidebar" class="toggle-btn" aria-label="Recolher menu">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
            </div>

            <!-- MENU -->
            <nav class="navbar">
                <ul class="nav-list">
                    <li>
                        <a href="/dashboard/profissional" class="nav-link active">
                            <i class="fa-solid fa-house"></i><span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/profissional/utentes" class="nav-link">
                            <i class="fa-solid fa-users"></i><span>Utentes</span>
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/profissional/mensagens" class="nav-link">
                            <i class="fa-solid fa-message"></i><span>Mensagens</span>
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/profissional/monitorar" class="nav-link">
                            <i class="fa-solid fa-"></i><span>Monitorar</span>
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/profissional/agendamento" class="nav-link">
                            <i class="fa-solid fa-calendar-check"></i><span>Agendamento</span>
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/profissional/alertas" class="nav-link">
                            <i class="fa-solid fa-bell"></i><span>Alertas</span>
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/profissional/perfil" class="nav-link">
                            <i class="fa-solid fa-user"></i><span>Perfil</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- LOGOUT -->
            <div class="logout-area">
                <a href="/auth/logout" class="nav-link logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Sair</span> </a>
            </div>
        </aside>
    </div>
</body>

</html>
