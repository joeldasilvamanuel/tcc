<!DOCTYPE html>
<html lang="en" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logo02.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Health Access Hub | Dashboard Administrador</title>
    <link rel="stylesheet" href="/css/admin/adminDah.css">
    <style>
        .aa {
            padding: 5px;
            margin-top: 580px;
            margin-left: 20px;
            margin-bottom: 50px;
            text-decoration: none;
            color: #007bff;
            background: aquamarine;
        }
    </style>
</head>

<body>
    <div class="app">
        <a href="/dashboard/admin/consultas" class="aa">
            <i class="fa-solid fa-chevron-left"></i><span>Voltar para Utilizadores</span>
        </a>
    </div>

    <!-- all code JS -->
    <script src="/js/header.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- js dashboard -->
    <script src="/js/profDash.js"></script>

    <!-- graficos -->
    <script>
        const ctx = document.getElementById('hospitalChart').getContext('2d');

        // Gradiente para a linha (opcional, mas fica muito elegante)
        let gradient = ctx.createLinearGradient(0, 0, 0, 200);
        gradient.addColorStop(0, 'rgba(34, 197, 94, 0.4)'); // Verde suave em cima
        gradient.addColorStop(1, 'rgba(34, 197, 94, 0)');   // Transparente em baixo

        let ecgData = Array(40).fill(5);
        let labels = Array(40).fill('');

        const hospitalChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: ecgData,
                    borderColor: '#22c55e', // Verde "Saúde" (Emerald)
                    borderWidth: 2.5,
                    pointRadius: 0,
                    tension: 0.4, // Linha mais orgânica e suave
                    fill: true,
                    backgroundColor: gradient
                }]
            },
            options: {
                animation: false,
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        display: true,
                        min: 0, max: 20,
                        grid: { color: '#f1f5f9' }, // Grelha muito clarinha
                        ticks: { display: false }
                    },
                    x: { display: false }
                },
                plugins: { legend: { display: false } }
            }
        });

        let counter = 0;
        function updateMonitor() {
            let newValue = 5; // Linha base
            let step = counter % 15;

            // Simula o pulso de forma suave
            if (step === 3) newValue = 15;      // Pico R
            else if (step === 2 || step === 4) newValue = 2; // Vales S e Q
            else newValue = 5 + (Math.random() * 1); // Oscilação leve

            ecgData.push(newValue);
            ecgData.shift();

            if (counter % 10 === 0) {
                document.getElementById('bpmValue').textContent = Math.floor(Math.random() * (78 - 72 + 1)) + 72;
            }

            hospitalChart.update('none');
            counter++;
        }

        setInterval(updateMonitor, 100);
    </script>
</body>

</html>
