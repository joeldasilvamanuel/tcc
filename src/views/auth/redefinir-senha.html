<!DOCTYPE html>
<html lang="en" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="icon" type="image/png" href="/img/logo02.png">
    <link rel="stylesheet" href="/css/auth/redefinir-senha.css">
    <title>Health Access Hub | Redefinir Senha</title>
</head>

<body>
    <div class="container">
        <h1>Criar nova senha</h1>
        <p>Digite sua nova senha abaixo. O link é válido por 1 hora.</p>

        <form id="formReset">
            <input type="password" id="password" placeholder="Nova senha" minlength="6" required>
            <input type="password" id="confirmPassword" placeholder="Confirme a nova senha" minlength="6" required>
            <button type="submit" id="btnSalvar">Salvar nova senha</button>
        </form>

        <div id="mensagem" class="msg"></div>
        <a href="/login" class="voltar"><i class="bi bi-arrow-left"></i> Voltar ao Login</a>
    </div>

    <script>
        const form = document.getElementById('formReset');
        const btn = document.getElementById('btnSalvar');
        const msg = document.getElementById('mensagem');

        // Pega o token da URL: ?token=abc123
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        // Se não tiver token na URL, já manda pro erro
        if (!token) {
            window.location.href = '/error.html?erro=token';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.textContent = '';
            msg.className = 'msg';

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                msg.textContent = 'As senhas não coincidem.';
                msg.classList.add('erro');
                return;
            }

            if (password.length < 6) {
                msg.textContent = 'A senha deve ter pelo menos 6 caracteres.';
                msg.classList.add('erro');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Salvando...';

            try {
                const res = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                // Se o backend redirecionou = deu certo
                // if (res.redirected) {
                //     window.location.hret = res.url; // vai mandar para o login
                //     return;
                // }

                // // Se o backend nao redirecionou deu erro e voltou JSON
                // const data = await res.json();
                // msg.textContent = data.erro || 'Link invalido ou expirou';
                // msg.classList.add('erro');

                // O backend faz redirect, então se chegou aqui deu erro
                if (!res.redirected) {
                    const data = await res.json();
                    msg.textContent = data.erro || 'Link inválido ou expirado.';
                    msg.classList.add('erro');
                    btn.disabled = false;
                    btn.textContent = 'Salvar nova senha';
                }
                // Se deu certo, o backend redireciona pra /login sozinho
            } //catch (err) {
            //     console.error(err);
            //     msg.textContent = 'Erro de conexao. Tente novamente';
            //     msg.classList.add('erro');
            // } finally {
            //     btn.disabled = false;
            //     btn.textContent = 'Salvar nova senha';
            // }
            catch (err) {
                msg.textContent = 'Erro de conexão. Tente novamente.';
                msg.classList.add('erro');
                btn.disabled = false;
                btn.textContent = 'Salvar nova senha';
            }
        });
    </script>
</body>

</html>
