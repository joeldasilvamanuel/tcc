<!DOCTYPE html>
<html lang="en" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="icon" type="image/png" href="/img/logo02.png">
    <link rel="stylesheet" href="/css/auth/recuparar.css">
    <title>Health Access Hub | Rcuperar-Senha</title>
</head>

<body>
    <div class="container">
        <form action="#" id="formRecuperar">
            <h2>Esqueceu a senha?</h2>
            <p>Digite seu email e vamos te enviar um link para criar uma nova senha.</p>
            <div class="rec">
                <input type="email" id="email" name="email" placeholder="Digite o seu email cadastrado" required>
                <button type="submit" id="btnEnviar">Enviar</button>
            </div>
        </form>

        <div class="msg" id="mensagem"></div>
        <a href="/"><i class="bi bi-arrow-left"></i> Voltar ao Login</a>
    </div>

    <script>
        const form = document.getElementById('formRecuperar');
        const btn = document.getElementById('btnEnviar');
        const mensagem = document.getElementById('mensagem');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = 'Enviando...';
            mensagem.textContent = '';
            mensagem.className = 'msg';

            const email = document.getElementById('email').value;

            try {
                const res = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (res.ok) {
                    mensagem.textContent = 'Se o email existir, você receberá um link em instantes.';
                    mensagem.className.add('sucesso');
                    form.reset();
                } else {
                    mensagem.textContent = data.erro || 'Ocorreu um erro. Tente novamente.';
                    mensagem.classList.add('erro');
                }
            } catch (err) {
                mensagem.textContent = 'Erro de conexão. Tente novamente.';
                mensagem.classList.add('erro');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Enviar link';
            }
        });
    </script>
</body>

</html>
