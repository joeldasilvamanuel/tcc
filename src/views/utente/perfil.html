<!DOCTYPE html>
<html lang="pt" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logo02.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/utente/perfil.css">
    <title>Health Access Hub | Perfil do Utente</title>
</head>

<body>
    <div class="app">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="expanded">

            <div class="sidebar-top">
                <div class="logo-box">
                    <img src="/img/logo02.png" alt="Health Access Hub">
                </div>

                <button id="toggleSidebar" class="toggle-btn">
                    <!-- <i class="fa-solid fa-chevron-left"></i> -->
                    <!-- <i class="fa-solid fa-columns"></i> -->
                    <i class="fa-solid fa-angles-left"></i>
                </button>
                <!-- <i class="fa-solid fa-bars"></i><i class="fa-solid fa-outdent"></i> -->
            </div>

            <!-- MENU UTENTE -->
            <nav class="navbar">
                <ul class="nav-list">

                    <li>
                        <a href="/dashboard/utente" class="nav-link">
                            <i class="fa-solid fa-house"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>

                    <li>
                        <a href="/dashboard/utente/consultas" class="nav-link">
                            <i class="fa-solid fa-calendar-check"></i>
                            <span>Minhas Consultas</span>
                        </a>
                    </li>

                    <li>
                        <a href="/dashboard/utente/exames" class="nav-link">
                            <i class="fa-solid fa-file-medical"></i>
                            <span>Monitoramento</span>
                        </a>
                    </li>

                    <li>
                        <a href="/dashboard/utente/mensagens" class="nav-link">
                            <i class="fa-solid fa-message"></i>
                            <span>Mensagens</span>
                        </a>
                    </li>

                    <li>
                        <a href="/dashboard/utente/perfil" class="nav-link active">
                            <i class="fa-solid fa-user"></i>
                            <span>Perfil</span>
                        </a>
                    </li>

                </ul>
            </nav>

            <a href="/auth/logout" class="nav-link logout">
                <i class="fa-solid fa-gear"></i>
                <span>Definições</span>
            </a>

            <!-- LOGOUT -->
            <div class="logout-area">
                <a href="/auth/logout" class="nav-link logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Sair</span>
                </a>
            </div>

        </aside>

        <!-- MAIN -->
        <main id="mainContent">

            <!-- HEADER -->
            <header class="main-header">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="search" placeholder="Pesquisar...">
                </div>

                <div class="header-right">
                    <a href="/dashboard/utente/alertas">
                        <div class="notification-icon">
                            <i class="fa-solid fa-bell"></i>
                            <span class="notification-badge">3</span>
                        </div>
                    </a>

                    <div class="user-profile">
                        <div class="user-avatar">
                            <img src="/img/fotoPadra.png" alt="Avatar" id="headerAvatar">
                        </div>
                        <div class="user-info">
                            <p class="user-name" id="userName">Carregando...</p>
                            <p class="user-role">Utente</p>
                        </div>
                    </div>
                </div>
            </header>

            <!-- PERFIL + CALENDÁRIO -->
            <section class="dashboard-grid">

                <!-- CARD PERFIL -->
                <div class="perfil-card" style="text-align:center; padding:25px;">

                    <div style="position:relative; display:inline-block;">
                        <img src="/img/fotoPadra.png" id="perfilFoto" class="perfil-foto"
                            style="width:150px;height:150px;border-radius:50%;object-fit:cover;border:3px solid #007bff;">

                        <label for="uploadFoto" style="position:absolute;bottom:5px;right:5px;background:#007bff;
                            color:white;padding:8px;border-radius:50%;cursor:pointer;">
                            <i class="fa-solid fa-camera"></i>
                        </label>

                        <input type="file" id="uploadFoto" accept="image/*" style="display:none;">
                    </div>

                    <h2 id="perfilNomeReal">Carregando...</h2>
                    <p><strong>Email:</strong> <span id="perfilEmailReal">...</span></p>
                    <p><strong>Tipo de Conta:</strong> Utente</p>

                    <button onclick="removerFoto()"
                        style="margin-top:10px;background:none;border:none;color:#ef4444;cursor:pointer;font-size:0.8rem;">
                        Remover foto personalizada
                    </button>
                </div>

                <!-- CALENDÁRIO (CONSULTAS DO UTENTE) -->
                <section class="calendar-section">
                    <div class="calendar-container">
                        <div class="calendar-header">
                            <button id="prevMonth" class="calendar-btn">
                                <i class="fa-solid fa-chevron-left"></i>
                            </button>
                            <h2 id="monthYear"></h2>
                            <button id="nextMonth" class="calendar-btn">
                                <i class="fa-solid fa-chevron-right"></i>
                            </button>
                        </div>

                        <div class="calendar-weekdays">
                            <div>Dom</div>
                            <div>Seg</div>
                            <div>Ter</div>
                            <div>Qua</div>
                            <div>Qui</div>
                            <div>Sex</div>
                            <div>Sab</div>
                        </div>

                        <div class="calendar-days" id="calendarDays"></div>
                    </div>
                </section>
            </section>

        </main>
    </div>

    <script src="/js/header.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {

            const sidebar = document.getElementById("sidebar");
            const toggleBtn = document.getElementById("toggleSidebar");
            const app = document.querySelector(".app");
            const fileInput = document.getElementById('uploadFoto');
            const fotoExibicao = document.getElementById('perfilFoto');
            const headerAvatar = document.getElementById('headerAvatar');

            /* SIDEBAR */
            const savedState = localStorage.getItem('sidebarState') || 'expanded';
            if (savedState === 'collapsed') {
                sidebar.classList.add('collapsed');
                app.classList.add('collapsed');
                toggleBtn.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';
            }

            toggleBtn.addEventListener("click", () => {
                const collapsed = sidebar.classList.toggle("collapsed");
                app.classList.toggle("collapsed", collapsed);
                toggleBtn.innerHTML = collapsed ?
                    '<i class="fa-solid fa-chevron-right"></i>' :
                    '<i class="fa-solid fa-chevron-left"></i>';
                localStorage.setItem('sidebarState', collapsed ? 'collapsed' : 'expanded');
            });

            /* BUSCAR DADOS DO UTENTE */
            try {
                const res = await fetch('/api/user-info');
                if (!res.ok) throw new Error();
                const data = await res.json();

                document.getElementById('userName').textContent = data.nome;
                document.getElementById('perfilNomeReal').textContent = data.nome;
                document.getElementById('perfilEmailReal').textContent = data.email || 'Não informado';

                const avatarPadrao =
                    `https://ui-avatars.com/api/?name=${encodeURIComponent(data.nome)}&background=007bff&color=fff`;

                const fotoFinal = data.foto_perfil || avatarPadrao;

                fotoExibicao.src = fotoFinal;
                headerAvatar.src = fotoFinal;

            } catch {
                window.location.href = '/';
            }

            /* UPLOAD FOTO */
            fileInput.addEventListener('change', async function () {
                const file = this.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = e => {
                    fotoExibicao.src = e.target.result;
                    headerAvatar.src = e.target.result;
                };
                reader.readAsDataURL(file);

                const formData = new FormData();
                formData.append('foto', file);

                await fetch('/api/upload-foto', {
                    method: 'POST',
                    body: formData
                });
            });

            /* CALENDÁRIO */
            let currentDate = new Date();

            function renderCalendar() {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                document.getElementById('monthYear').textContent =
                    currentDate.toLocaleDateString('pt-PT', { month: 'long', year: 'numeric' });

                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                let html = '';
                for (let i = 0; i < firstDay; i++) html += '<div class="day empty"></div>';

                for (let d = 1; d <= daysInMonth; d++) {
                    const isToday = new Date(year, month, d).toDateString() === new Date().toDateString();
                    html += `<div class="day ${isToday ? 'today' : ''}">${d}</div>`;
                }

                document.getElementById('calendarDays').innerHTML = html;
            }

            document.getElementById('prevMonth')
                .addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); });

            document.getElementById('nextMonth')
                .addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); });

            renderCalendar();
        });

        /* REMOVER FOTO */
        async function removerFoto() {
            if (confirm("Desejas remover a tua foto personalizada?")) {
                await fetch('/api/remover-foto', { method: 'POST' });
                window.location.reload();
            }
        }
    </script>
</body>

</html>
